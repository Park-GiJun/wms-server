# inventory-service 전용 설정 (공통 application.yml 위로 병합).
# ★척추 = 재고원장(append-only)·재고/로케이션 투영·stock.movement 발행. DB-per-service.
server:
  port: 19101

spring:
  # dev 기본 = H2(PostgreSQL 호환 모드). 운영은 DB_URL/DB_USERNAME/DB_PASSWORD 로 PostgreSQL 주입.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:wms_inventory;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  kafka:
    consumer:
      # 이동 커맨드/이벤트 consumer 그룹
      group-id: ${KAFKA_GROUP_INVENTORY:wms-inventory}

# 재고/이동 규칙 (가정값). 도메인 설계에 맞게 채운다.
inventory:
  # stock.movement 토픽(발행) — key="{itemId}:{locationId}" 로 (품목,로케이션) 단위 순서보장.
  topic:
    stock-movement: ${TOPIC_STOCK_MOVEMENT:stock.movement}
  # 음수재고 차단(오버피킹 방지). 조정(ADJUSTMENT)만 예외 허용.
  allow-negative: false
