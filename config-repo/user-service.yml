# user-service 전용 설정 (공통 application.yml 위로 병합).
# 신원(user) 마스터 소유. JWT 발급. DB-per-service.
server:
  port: 19103

spring:
  # DB-per-service — 값은 .env/배포 환경변수로 주입. fallback 없음: 정보가 없으면 부팅 실패가 맞다.
  datasource:
    url: ${USER_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  kafka:
    consumer:
      group-id: ${KAFKA_GROUP_USER:wms-user}

# 발급 토큰 유효시간(user-service 전용). secret/issuer 는 공통 application.yml 참조.
jwt:
  access-token-validity-minutes: ${JWT_VALIDITY_MINUTES:1440}
