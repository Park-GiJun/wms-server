# master-service 전용 설정 (공통 application.yml 위로 병합).
# 품목·로케이션·거래처 마스터. DB-per-service. (신원/JWT 발급은 user-service 로 분리.)
server:
  port: 19102

spring:
  # DB-per-service — 값은 .env/배포 환경변수로 주입. fallback 없음: 정보가 없으면 부팅 실패가 맞다.
  datasource:
    url: ${MASTER_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  kafka:
    consumer:
      group-id: ${KAFKA_GROUP_MASTER:wms-master}
