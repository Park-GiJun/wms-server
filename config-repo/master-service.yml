# master-service 전용 설정 (공통 application.yml 위로 병합).
# ★척추 = 재고원장(append-only)·재고/로케이션 투영·stock.movement 발행
# + 품목·로케이션·거래처 마스터(구 inventory-service 통합)
# + 신원(user) 마스터·JWT 발급(구 user-service 통합). DB-per-service.
server:
  port: 19102

spring:
  # DB-per-service — 값은 .env/배포 환경변수로 주입. fallback 없음: 정보가 없으면 부팅 실패가 맞다.
  datasource:
    url: ${MASTER_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  kafka:
    consumer:
      group-id: ${KAFKA_GROUP_MASTER:wms-master}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# 발급 토큰 유효시간(신원 마스터 소유자 = 발급자). secret/issuer 는 공통 application.yml 참조.
jwt:
  access-token-validity-minutes: ${JWT_VALIDITY_MINUTES:1440}

inventory:
  # stock.movement 토픽(발행) — key="{skuId}:{locationId}" 로 (SKU,로케이션) 단위 순서보장.
  topic:
    stock-movement: ${TOPIC_STOCK_MOVEMENT:stock.movement}
