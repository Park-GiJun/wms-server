# notification-service 전용 설정 (공통 application.yml 위로 병합).
# 알림 피처 — stock.movement 등 이벤트 구독. DB-per-service.
server:
  port: 19104

spring:
  # DB-per-service — 값은 .env/배포 환경변수로 주입. fallback 없음: 정보가 없으면 부팅 실패가 맞다.
  datasource:
    url: ${NOTIFICATION_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  kafka:
    consumer:
      group-id: ${KAFKA_GROUP_NOTIFICATION:wms-notification}
