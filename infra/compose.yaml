# 로컬 dev 인프라. 시크릿은 하드코딩하지 않고 환경변수 보간 + dev 기본값을 쓴다.
# repo 루트 .env 값을 쓰려면 루트에서:  docker compose --env-file .env -f infra/compose.yaml up -d
# (기본값만으로도 로컬에선 그대로 동작한다. 운영은 ticket-server/rally/trading 과 동일 공유 인프라를
#  재사용하고 wms 는 스키마/토픽/Redis key prefix 로 격리한다 — 여기로 운영을 띄우지 않는다.)
services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-wms}'
      - 'POSTGRES_USER=${DB_USERNAME:-wms}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD:-wms}'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
  redis:
    image: 'redis:latest'
    command: ${REDIS_PASSWORD:+redis-server --requirepass ${REDIS_PASSWORD}}
    ports:
      - '${REDIS_PORT:-6379}:6379'
  kafka:
    image: 'confluentinc/cp-kafka:7.6.1'
    environment:
      - 'KAFKA_NODE_ID=1'
      - 'KAFKA_PROCESS_ROLES=broker,controller'
      - 'KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093'
      - 'KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      # 호스트(앱)에서 localhost:9092 로 접근 가능하도록 advertised listener 를 localhost 로 노출
      - 'KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092'
      - 'KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      - 'KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER'
      - 'KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1'
      - 'CLUSTER_ID=${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}'
    ports:
      # 고정 매핑: 앱의 spring.kafka.bootstrap-servers=localhost:9092 와 일치
      - '${KAFKA_PORT:-9092}:9092'
