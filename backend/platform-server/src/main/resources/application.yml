# platform-server = config(Spring Cloud Config native) + discovery(Eureka) 통합. 단일 포트 19159.
# 자기 자신은 config-server 를 import 하지 않는다(자기가 config-server다 — 부트스트랩 순환 방지).
server:
  port: 19159

spring:
  application:
    name: platform-server
  profiles:
    # native = 파일시스템 백엔드. (git 백엔드로 전환하려면 이 프로필을 빼고 spring.cloud.config.server.git 설정)
    active: native
  cloud:
    config:
      server:
        native:
          # 저장소 루트의 config-repo/ 를 설정 소스로 사용.
          # bootRun 의 workingDir 이 repo 루트로 고정돼 있어(상위 build.gradle.kts) 상대경로가 맞는다.
          # IDE/jar 실행 등 다른 작업 디렉터리에서는 CONFIG_REPO_LOCATION 으로 절대경로 주입.
          search-locations: ${CONFIG_REPO_LOCATION:file:./config-repo}

# 단일 노드 Eureka: 자기 자신은 레지스트리에 등록/페치하지 않는다.
# dev 기본 = localhost. 운영은 prod 프로파일이 홈서버 IP 로 자기 자신을 광고한다.
# Config 와 같은 포트(19159)에서 Eureka 가 함께 서빙된다.
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# prod 프로파일 — 다른 머신의 클라이언트가 이 호스트로 등록 정보를 받으므로 실제 접근 가능한 IP 를 광고한다.
spring:
  config:
    activate:
      on-profile: prod
eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:210.121.177.150}
