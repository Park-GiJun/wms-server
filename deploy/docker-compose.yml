# wms-server 배포 (홈서버 — 공유 infra-net 위에 wms 서비스만 올린다). 백엔드 전용(web 없음).
# 내부 서비스(platform/master/inventory/user)는 wms-net 전용, gateway 만 호스트 노출.
# 실행:  docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d
# 서비스 1개만 교체:  docker compose -f deploy/docker-compose.yml up -d --no-deps <service>
#
# 전제: 공유 인프라(infra-postgres/infra-redis/kafka, 네트워크 infra-net)가 미리 떠 있어야 한다.
#       공유 PostgreSQL 에 wms_master / wms_inventory / wms_user database 가 있어야 한다(DB-per-service).
name: wms

x-backend-build: &backend-build
  context: ../backend
  dockerfile: Dockerfile

services:
  # ── 플랫폼 = Config(config-repo/ 볼륨으로 읽는다 — 설정 변경 시 재빌드 불필요) + Eureka 통합 ──
  platform-server:
    build: { <<: *backend-build, args: { MODULE: platform-server } }
    image: wms-platform-server
    environment:
      CONFIG_REPO_LOCATION: file:/config-repo
    volumes:
      - ../config-repo:/config-repo:ro
    networks: [wms-net]
    restart: unless-stopped

  # ── 외부 진입점 (호스트 노출) ──
  gateway:
    build: { <<: *backend-build, args: { MODULE: gateway } }
    image: wms-gateway
    environment:
      CONFIG_SERVER_URL: http://platform-server:19159
      EUREKA_URL: http://platform-server:19159/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-wms}
    ports:
      - "19100:19100"
    networks: [wms-net]
    depends_on: [platform-server]
    restart: unless-stopped

  # ── 마스터 (품목/로케이션/거래처 마스터 · PostgreSQL · Kafka · Redis) ──
  master-service:
    build: { <<: *backend-build, args: { MODULE: master-service } }
    image: wms-master-service
    environment:
      CONFIG_SERVER_URL: http://platform-server:19159
      EUREKA_URL: http://platform-server:19159/eureka/
      MASTER_DB_URL: jdbc:postgresql://infra-postgres:5432/wms_master
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: infra-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [wms-net, infra-net]
    depends_on: [platform-server]
    restart: unless-stopped

  # ── 신원·인증 (user 마스터 · JWT 발급 · PostgreSQL · Kafka · Redis) ──
  user-service:
    build: { <<: *backend-build, args: { MODULE: user-service } }
    image: wms-user-service
    environment:
      CONFIG_SERVER_URL: http://platform-server:19159
      EUREKA_URL: http://platform-server:19159/eureka/
      USER_DB_URL: jdbc:postgresql://infra-postgres:5432/wms_user
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: infra-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-wms}
      JWT_VALIDITY_MINUTES: ${JWT_VALIDITY_MINUTES:-1440}
    networks: [wms-net, infra-net]
    depends_on: [platform-server]
    restart: unless-stopped

  # ── ★척추: 재고원장 (append-only 이동 · stock.movement 발행 · PostgreSQL · Kafka · Redis) ──
  inventory-service:
    build: { <<: *backend-build, args: { MODULE: inventory-service } }
    image: wms-inventory-service
    environment:
      CONFIG_SERVER_URL: http://platform-server:19159
      EUREKA_URL: http://platform-server:19159/eureka/
      INVENTORY_DB_URL: jdbc:postgresql://infra-postgres:5432/wms_inventory
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: infra-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [wms-net, infra-net]
    depends_on: [platform-server]
    restart: unless-stopped

networks:
  # wms 전용 내부 네트워크
  wms-net:
    name: wms-net
  # 공유 인프라(PostgreSQL/Redis/Kafka)가 사는 외부 네트워크 — 미리 존재해야 한다.
  infra-net:
    external: true
